<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Phase Mark: Unusonic Vesica. Coniunctio oppositorum — two become one. -->
  <!-- viewBox 40x40, R = 10.5, separation = R (classical vesica piscis). -->
  <circle cx="14.75" cy="20" r="10.5" stroke="currentColor" stroke-width="2.2"/>
  <circle cx="25.25" cy="20" r="10.5" stroke="currentColor" stroke-width="2.2"/>
  <!-- Almond lens — the overlap seam. halfH = sqrt(R^2 - (R/2)^2) = R * sqrt(3)/2 ≈ 9.093. -->
  <path d="M 20 10.907 A 10.5 10.5 0 0 1 20 29.093 A 10.5 10.5 0 0 1 20 10.907 Z"
        stroke="currentColor" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
</svg>
