name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint (errors hard-fail)
        run: npm run lint

      - name: Lint baseline ratchet (warnings can't exceed snapshot)
        run: npm run lint:baseline:check

      - name: LOC ratchet (over-limit files can't grow)
        run: npm run loc:baseline:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

  db-tests:
    name: Database RLS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start -x realtime,storage,imgproxy,edge-runtime,logflare,vector,supavisor

      - name: Run pgTAP tests
        run: supabase test db

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [quality]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
